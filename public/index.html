<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Голосові нотатки</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --card2: #232734; --text: #e8eaf0;
    --muted: #9aa0b0; --accent: #e05d5d; --accent2: #4f8cff; --border: #2c3040;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  .container { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; }
  h1 { font-size: 1.5rem; margin-bottom: 4px; }
  .subtitle { color: var(--muted); font-size: .9rem; margin-bottom: 20px; }

  .recorder { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 24px; text-align: center; margin-bottom: 24px; }
  .rec-btn { width: 84px; height: 84px; border-radius: 50%; border: none; cursor: pointer; background: var(--accent); color: #fff; font-size: 2rem; transition: all .2s; box-shadow: 0 0 0 0 rgba(224,93,93,.5); }
  .rec-btn:hover { transform: scale(1.05); }
  .rec-btn.recording { animation: pulse 1.5s infinite; background: #c33; }
  @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(224,93,93,.5);} 70% { box-shadow: 0 0 0 22px rgba(224,93,93,0);} 100% { box-shadow: 0 0 0 0 rgba(224,93,93,0);} }
  .rec-status { margin-top: 12px; color: var(--muted); min-height: 22px; }
  .timer { font-variant-numeric: tabular-nums; font-size: 1.2rem; color: var(--text); }
  .live-transcript { margin-top: 14px; background: var(--card2); border-radius: 10px; padding: 12px; text-align: left; min-height: 48px; color: var(--text); font-size: .95rem; display: none; }
  select { background: var(--card2); color: var(--text); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: .9rem; }
  .rec-options { display: flex; flex-wrap: wrap; gap: 12px; justify-content: center; align-items: center; margin-bottom: 16px; }
  .save-audio { color: var(--muted); font-size: .85rem; display: inline-flex; align-items: center; gap: 6px; cursor: pointer; }
  .save-audio input { accent-color: var(--accent2); width: 16px; height: 16px; }
  .mobile-hint { color: var(--muted); font-size: .78rem; margin-bottom: 12px; max-width: 480px; margin-left: auto; margin-right: auto; }

  .tabs { display: flex; gap: 8px; margin-bottom: 16px; }
  .tab { flex: 1; padding: 10px; background: var(--card); border: 1px solid var(--border); border-radius: 10px; cursor: pointer; text-align: center; color: var(--muted); }
  .tab.active { color: var(--text); border-color: var(--accent2); background: var(--card2); }

  .search-bar { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .search-bar input { background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 10px 12px; font-size: .95rem; }
  .search-bar input[type=text] { flex: 1 1 200px; }
  .search-bar input[type=date] { flex: 0 1 150px; }
  .btn { background: var(--accent2); border: none; color: #fff; border-radius: 8px; padding: 10px 16px; cursor: pointer; font-size: .9rem; }
  .btn.secondary { background: var(--card2); border: 1px solid var(--border); color: var(--muted); }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; margin-bottom: 12px; }
  .card h3 { font-size: 1.05rem; margin-bottom: 4px; }
  .card .meta { color: var(--muted); font-size: .8rem; margin-bottom: 8px; }
  .card .desc { color: var(--text); font-size: .92rem; margin-bottom: 8px; }
  .card details { margin-top: 8px; }
  .card summary { cursor: pointer; color: var(--accent2); font-size: .85rem; }
  .card .transcript { margin-top: 8px; color: var(--muted); font-size: .9rem; white-space: pre-wrap; }
  .card audio { width: 100%; margin-top: 8px; height: 36px; }
  .card-actions { margin-top: 8px; display: flex; gap: 8px; }
  .del-btn { background: none; border: 1px solid var(--border); color: var(--muted); border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: .8rem; }
  .del-btn:hover { color: var(--accent); border-color: var(--accent); }
  .empty { text-align: center; color: var(--muted); padding: 40px 0; }

  .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .cal-header h2 { font-size: 1.1rem; text-transform: capitalize; }
  .cal-nav { background: var(--card2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 14px; cursor: pointer; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
  .cal-dow { text-align: center; color: var(--muted); font-size: .75rem; padding: 4px 0; }
  .cal-day { background: var(--card); border: 1px solid var(--border); border-radius: 10px; min-height: 64px; padding: 6px; cursor: default; position: relative; }
  .cal-day.other { opacity: .25; }
  .cal-day.today { border-color: var(--accent2); }
  .cal-day .num { font-size: .8rem; color: var(--muted); }
  .cal-day .badge { position: absolute; bottom: 6px; right: 6px; background: var(--accent); color: #fff; border-radius: 10px; font-size: .72rem; padding: 1px 7px; }
  .cal-day.has { cursor: pointer; }
  .cal-day.has:hover { background: var(--card2); }
  #view-calendar, .hidden { display: none; }
</style>
</head>
<body>
<div class="container">
  <h1>🎙️ Голосові нотатки</h1>
  <p class="subtitle">Запис → розпізнавання → автоматична назва й опис → пошук і календар</p>

  <div class="recorder">
    <div class="rec-options">
      <span>
        <label for="lang" style="color:var(--muted);font-size:.85rem;margin-right:8px">Мова:</label>
        <select id="lang">
          <option value="uk-UA" selected>Українська</option>
          <option value="en-US">English</option>
          <option value="pl-PL">Polski</option>
          <option value="de-DE">Deutsch</option>
          <option value="fr-FR">Français</option>
          <option value="es-ES">Español</option>
        </select>
      </span>
      <label class="save-audio"><input type="checkbox" id="saveAudio" checked> Зберігати аудіо</label>
    </div>
    <div class="mobile-hint">Розпізнавання виконується на сервері після завершення запису — однаково надійно на телефоні й комп'ютері.</div>
    <button id="recBtn" class="rec-btn" title="Почати запис">🎤</button>
    <div class="rec-status" id="recStatus">Натисніть, щоб почати запис</div>
    <div class="live-transcript" id="liveTranscript"></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-view="list">📋 Записи</div>
    <div class="tab" data-view="calendar">📅 Календар</div>
  </div>

  <div id="view-list">
    <div class="search-bar">
      <input type="text" id="q" placeholder="Пошук за ключовими словами...">
      <input type="date" id="from" title="Від дати">
      <input type="date" id="to" title="До дати">
      <button class="btn" id="searchBtn">Пошук</button>
      <button class="btn secondary" id="resetBtn">Скинути</button>
    </div>
    <div id="list"></div>
  </div>

  <div id="view-calendar">
    <div class="cal-header">
      <button class="cal-nav" id="prevMonth">←</button>
      <h2 id="calTitle"></h2>
      <button class="cal-nav" id="nextMonth">→</button>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);

let mediaRecorder = null, chunks = [];
let recording = false, startTime = 0, timerInt = null;

$('recBtn').addEventListener('click', () => recording ? stopRecording() : startRecording());

async function startRecording() {
  chunks = [];
  $('liveTranscript').style.display = 'none';
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.ondataavailable = (e) => e.data.size && chunks.push(e.data);
    mediaRecorder.start(1000);

    recording = true;
    startTime = Date.now();
    $('recBtn').classList.add('recording');
    $('recBtn').textContent = '⏹';
    timerInt = setInterval(() => {
      const s = Math.floor((Date.now() - startTime) / 1000);
      $('recStatus').innerHTML = '<span class="timer">' + String(Math.floor(s/60)).padStart(2,'0') + ':' + String(s%60).padStart(2,'0') + '</span> — йде запис...';
    }, 250);
  } catch (err) {
    recording = false;
    $('recStatus').textContent = '⚠️ Немає доступу до мікрофона: ' + err.message;
  }
}

function stopRecording() {
  recording = false;
  clearInterval(timerInt);
  const durationSec = (Date.now() - startTime) / 1000;
  $('recBtn').classList.remove('recording');
  $('recBtn').textContent = '🎤';

  mediaRecorder.onstop = async () => {
    mediaRecorder.stream.getTracks().forEach(t => t.stop());
    const blob = new Blob(chunks, { type: mediaRecorder.mimeType || 'audio/webm' });
    const audioBase64 = await blobToBase64(blob);
    const audioMime = blob.type || 'audio/webm';

    // 1) Розпізнавання на сервері (Whisper) — один раз, у кінці запису
    $('recStatus').textContent = '🎧 Розпізнаю мовлення...';
    let transcript = '';
    try {
      const tr = await fetch('/api/transcribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ audioBase64, audioMime, lang: $('lang').value }),
      });
      if (tr.ok) {
        transcript = (await tr.json()).transcript || '';
      } else if (tr.status === 503) {
        console.warn('Transcription not configured (no OPENAI_API_KEY)');
      } else {
        console.warn('Transcription failed:', tr.status);
      }
    } catch (e) {
      console.warn('Transcription error:', e.message);
    }

    if (transcript) {
      const lt = $('liveTranscript');
      lt.style.display = 'block';
      lt.textContent = transcript;
    }

    // 2) Збереження запису
    $('recStatus').textContent = '⏳ Зберігаю та генерую назву й опис...';
    try {
      const resp = await fetch('/api/recordings', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          transcript,
          lang: $('lang').value,
          audioBase64: $('saveAudio').checked ? audioBase64 : null,
          audioMime,
          durationSec: Math.round(durationSec * 10) / 10,
        }),
      });
      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      $('recStatus').textContent = transcript ? '✅ Збережено!' : '⚠️ Збережено без транскрипту (розпізнавання не спрацювало).';
      loadList();
      loadCalendar();
    } catch (err) {
      $('recStatus').textContent = '⚠️ Помилка збереження: ' + err.message;
    }
  };
  mediaRecorder.stop();
}

function blobToBase64(blob) {
  return new Promise((resolve) => {
    const r = new FileReader();
    r.onloadend = () => resolve(r.result.split(',')[1]);
    r.readAsDataURL(blob);
  });
}

// ---------- Tabs ----------
document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  $('view-list').style.display = t.dataset.view === 'list' ? 'block' : 'none';
  $('view-calendar').style.display = t.dataset.view === 'calendar' ? 'block' : 'none';
  if (t.dataset.view === 'calendar') loadCalendar();
}));

// ---------- List / search ----------
const recMap = {};

async function loadList() {
  const params = new URLSearchParams();
  if ($('q').value.trim()) params.set('q', $('q').value.trim());
  if ($('from').value) params.set('from', $('from').value);
  if ($('to').value) params.set('to', $('to').value);
  const resp = await fetch('/api/recordings?' + params);
  const rows = await resp.json();
  const list = $('list');
  if (!rows.length) { list.innerHTML = '<div class="empty">Записів не знайдено</div>'; return; }
  list.innerHTML = rows.map(r => {
    recMap[r.id] = r;
    const d = new Date(r.created_at);
    const dur = r.duration_sec ? ' · ' + Math.round(r.duration_sec) + ' сек' : '';
    return `<div class="card">
      <h3>${esc(r.title)}</h3>
      <div class="meta">${d.toLocaleString('uk-UA')}${dur} · ${esc(r.lang)}</div>
      <div class="desc">${esc(r.description)}</div>
      ${r.has_audio ? `<audio controls preload="none" src="/api/recordings/${r.id}/audio"></audio>` : ''}
      ${r.transcript ? `<details><summary>Повний транскрипт</summary><div class="transcript">${esc(r.transcript)}</div></details>` : ''}
      <div class="card-actions">
        <button class="del-btn" onclick="editRec(${r.id})">✏️ Редагувати</button>
        <button class="del-btn" onclick="delRec(${r.id})">🗑 Видалити</button>
      </div>
    </div>`;
  }).join('');
}

async function editRec(id) {
  const r = recMap[id];
  if (!r) return;
  const title = prompt('Назва запису:', r.title);
  if (title === null) return;
  const description = prompt('Короткий опис:', r.description || '');
  if (description === null) return;
  await fetch('/api/recordings/' + id, {
    method: 'PATCH',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: title.trim() || r.title, description: description.trim() }),
  });
  loadList();
}

async function delRec(id) {
  if (!confirm('Видалити цей запис?')) return;
  await fetch('/api/recordings/' + id, { method: 'DELETE' });
  loadList();
  loadCalendar();
}

function esc(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

$('searchBtn').addEventListener('click', loadList);
$('q').addEventListener('keydown', e => e.key === 'Enter' && loadList());
$('resetBtn').addEventListener('click', () => { $('q').value=''; $('from').value=''; $('to').value=''; loadList(); });

// ---------- Calendar ----------
let calDate = new Date();
$('prevMonth').addEventListener('click', () => { calDate.setMonth(calDate.getMonth() - 1); loadCalendar(); });
$('nextMonth').addEventListener('click', () => { calDate.setMonth(calDate.getMonth() + 1); loadCalendar(); });

async function loadCalendar() {
  const y = calDate.getFullYear(), m = calDate.getMonth() + 1;
  $('calTitle').textContent = calDate.toLocaleString('uk-UA', { month: 'long', year: 'numeric' });
  let counts = {};
  try {
    const resp = await fetch(`/api/calendar?year=${y}&month=${m}`);
    (await resp.json()).forEach(r => counts[r.day] = r.count);
  } catch (_) {}

  const grid = $('calGrid');
  const dows = ['Пн','Вт','Ср','Чт','Пт','Сб','Нд'];
  let html = dows.map(d => `<div class="cal-dow">${d}</div>`).join('');
  const first = new Date(y, m - 1, 1);
  const startDow = (first.getDay() + 6) % 7; // Monday first
  const daysInMonth = new Date(y, m, 0).getDate();
  const todayStr = new Date().toISOString().slice(0, 10);

  for (let i = 0; i < startDow; i++) html += `<div class="cal-day other"></div>`;
  for (let d = 1; d <= daysInMonth; d++) {
    const dayStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const c = counts[dayStr] || 0;
    html += `<div class="cal-day ${c ? 'has' : ''} ${dayStr === todayStr ? 'today' : ''}" ${c ? `onclick="filterDay('${dayStr}')"` : ''}>
      <span class="num">${d}</span>${c ? `<span class="badge">${c}</span>` : ''}
    </div>`;
  }
  grid.innerHTML = html;
}

function filterDay(day) {
  $('from').value = day;
  $('to').value = day;
  $('q').value = '';
  document.querySelector('.tab[data-view=list]').click();
  loadList();
}

loadList();
loadCalendar();
</script>
</body>
</html>
